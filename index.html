<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>padding-size</title>
    <style>
        button{
                    background-color: rgb(7, 137, 7, 0.7727);
                    padding-top: 8px;
                    padding-bottom: 8px;
                    padding-left: 15px;
                    padding-right: 15px;
                    margin-right: 10px;
                    margin-left: 10px;
                    border: none;
                    border-radius: 3px;
                    color: white;
                    font-weight: bold;
                    font-size: 15px;
                    cursor: pointer;
                    transition: padding 0.15s, margin 0.15s;

        }

        button:hover{
                          padding-left: 25px;
                          padding-right: 25px;
                          margin-left: 0px;
                          margin-right: 0px;
        }
    </style>
</head>
<body>
    <button>One</button>
    <button>Two</button>
    <button>Three</button>
</body>
</html>
